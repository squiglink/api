services:
  api:
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SQUIGLINK_API_ENVIRONMENT: production
    healthcheck:
      interval: 10s
      retries: 5
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1:3000/health"]
      timeout: 5s
    image: ghcr.io/squiglink/api:latest
    ports:
      - 3000:3000
    restart: always

  postgres:
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${SQUIGLINK_POSTGRES_PASSWORD}
      POSTGRES_USER: ${SQUIGLINK_POSTGRES_USER}
    healthcheck:
      interval: 10s
      retries: 5
      test: ["CMD-SHELL", "pg_isready -U ${SQUIGLINK_POSTGRES_USER}"]
      timeout: 5s
    image: postgres:18.1-alpine
    ports:
      - 127.0.0.1:5432:5432
    restart: always
    volumes:
      - ./data/postgres:/var/lib/postgresql
