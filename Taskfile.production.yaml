tasks:
  database-create:
    desc: Create the database.
    env:
      PGPASSWORD: "{{.SQUIGLINK_POSTGRES_PASSWORD}}"
    cmds:
      - psql
        --command="CREATE DATABASE {{.SQUIGLINK_POSTGRES_DATABASE}};"
        --dbname=postgres
        --host={{.SQUIGLINK_POSTGRES_HOST}}
        --username={{.SQUIGLINK_POSTGRES_USER}}

  kysely:
    desc: Run a Kysely command against the database.
    cmds:
      - pnpm kysely {{.CLI_ARGS}}

version: 3
